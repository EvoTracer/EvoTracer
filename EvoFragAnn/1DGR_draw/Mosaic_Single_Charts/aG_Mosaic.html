                    var genes = geneData[fragID];

                    }
                    var html = "";

                        html += `

                            <div class="gene-loc">${g.loc}</div>

                    });
                    container.innerHTML = html;
                }

                    isCollapsed = !isCollapsed;
                    if(isCollapsed) {

                    } else {
                        sidebar.classList.remove('collapsed');
